startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      MBS_DATABASE_HOST:
        type: string
        default: "localhost"
        description: "MBS database host (clinicos_mbs)"
      MBS_DATABASE_PORT:
        type: integer
        default: 5432
        description: "MBS database port"
      MBS_DATABASE_USER:
        type: string
        default: "mcp_readonly"
        description: "MBS database user (read-only)"
      MBS_DATABASE_PASSWORD:
        type: string
        description: "MBS database password"
      MBS_DATABASE_NAME:
        type: string
        default: "clinicos_mbs"
        description: "MBS database name"
      ACCRED_DATABASE_HOST:
        type: string
        default: "localhost"
        description: "Accreditation database host (clinicos_accreditation)"
      ACCRED_DATABASE_PORT:
        type: integer
        default: 5432
        description: "Accreditation database port"
      ACCRED_DATABASE_USER:
        type: string
        default: "mcp_readonly"
        description: "Accreditation database user (read-only)"
      ACCRED_DATABASE_PASSWORD:
        type: string
        description: "Accreditation database password"
      ACCRED_DATABASE_NAME:
        type: string
        default: "clinicos_accreditation"
        description: "Accreditation database name"
      RAG_SPINE_URL:
        type: string
        default: "http://localhost:8001"
        description: "RAG Spine API URL"
    required:
      - MBS_DATABASE_PASSWORD
      - ACCRED_DATABASE_PASSWORD
  commandFunction: |
    (config) => ({
      command: 'uv',
      args: ['run', 'python', '-m', 'src.server'],
      env: {
        MBS_DATABASE_HOST: config.MBS_DATABASE_HOST || 'localhost',
        MBS_DATABASE_PORT: String(config.MBS_DATABASE_PORT || 5432),
        MBS_DATABASE_USER: config.MBS_DATABASE_USER || 'mcp_readonly',
        MBS_DATABASE_PASSWORD: config.MBS_DATABASE_PASSWORD,
        MBS_DATABASE_NAME: config.MBS_DATABASE_NAME || 'clinicos_mbs',
        ACCRED_DATABASE_HOST: config.ACCRED_DATABASE_HOST || 'localhost',
        ACCRED_DATABASE_PORT: String(config.ACCRED_DATABASE_PORT || 5432),
        ACCRED_DATABASE_USER: config.ACCRED_DATABASE_USER || 'mcp_readonly',
        ACCRED_DATABASE_PASSWORD: config.ACCRED_DATABASE_PASSWORD,
        ACCRED_DATABASE_NAME: config.ACCRED_DATABASE_NAME || 'clinicos_accreditation',
        RAG_SPINE_URL: config.RAG_SPINE_URL || 'http://localhost:8001',
        MCP_TRANSPORT: 'stdio',
      }
    })
